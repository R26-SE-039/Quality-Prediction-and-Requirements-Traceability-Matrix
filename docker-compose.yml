version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: nextgen-c4-postgres
    environment:
      POSTGRES_DB: nextgen_qa
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nextgen-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nextgen-c4-redis
    ports:
      - "6379:6379"
    networks:
      - nextgen-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j Graph Database (for RTM)
  neo4j:
    image: neo4j:5.15
    container_name: nextgen-c4-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    networks:
      - nextgen-network
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Component 4 Backend API
  component4-backend:
    build:
      context: ./component-4-quality
      dockerfile: Dockerfile
    container_name: nextgen-c4-backend
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://admin:password123@postgres/nextgen_qa
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      SENTENCE_TRANSFORMER_MODEL: all-MiniLM-L6-v2
      C4_SERVICE_PORT: 8004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./component-4-quality:/app
      - model_data:/app/saved_models
    networks:
      - nextgen-network
    command: >
      sh -c "python dataset/import_dataset.py &&
             python ml/train_quality_model.py &&
             uvicorn api.main:app --host 0.0.0.0 --port 8004"

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextgen-c4-frontend
    ports:
      - "3000:80"
    depends_on:
      - component4-backend
    networks:
      - nextgen-network

networks:
  nextgen-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  model_data:
